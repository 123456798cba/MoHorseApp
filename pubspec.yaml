name: daily_planner
description: "每日清单 + 记账，AI 智能录入"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 本地数据库
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # 状态管理
  provider: ^6.1.2

  # UI 组件
  table_calendar: ^3.1.3
  fl_chart: ^0.69.2

  # 语音识别
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # HTTP 请求（AI 大模型调用）
  http: ^1.2.0

  # 通知/提醒
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # 日期工具
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.3
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
